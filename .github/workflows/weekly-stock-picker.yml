name: AI 每周候选股票池

on:
  schedule:
    # 每周一北京时间 08:30，基于上一个交易日和周末公开信息生成候选观察池
    - cron: '30 0 * * 1'
  workflow_dispatch:
    inputs:
      top_n:
        description: '候选数量'
        required: false
        default: '3'
      news_enabled:
        description: '是否使用 Tavily 补充近期新闻'
        required: false
        default: true
        type: boolean
      send_notification:
        description: '是否推送到已配置通知渠道'
        required: false
        default: true
        type: boolean

concurrency:
  group: weekly-stock-picker
  cancel-in-progress: false

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.WEEKLY_PICKER_TIMEOUT_MINUTES || '20') }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs reports

      - name: 恢复上期候选快照
        uses: actions/cache@v4
        with:
          path: reports/weekly_stock_picker_*.json
          key: weekly-stock-picker-snapshots-${{ github.run_id }}
          restore-keys: |
            weekly-stock-picker-snapshots-

      - name: 生成候选观察池
        env:
          TZ: Asia/Shanghai
          LOG_LEVEL: INFO
          WEEKLY_PICKER_TIMEZONE: Asia/Shanghai
          WEEKLY_PICKER_TOP_N: ${{ github.event.inputs.top_n || vars.WEEKLY_PICKER_TOP_N || '3' }}
          WEEKLY_PICKER_NEWS_ENABLED: ${{ github.event.inputs.news_enabled || vars.WEEKLY_PICKER_NEWS_ENABLED || 'true' }}
          WEEKLY_PICKER_SEND: ${{ github.event.inputs.send_notification || vars.WEEKLY_PICKER_SEND || 'true' }}
          WEEKLY_PICKER_MIN_AMOUNT_YI: ${{ vars.WEEKLY_PICKER_MIN_AMOUNT_YI || '1.5' }}
          WEEKLY_PICKER_MIN_TURNOVER: ${{ vars.WEEKLY_PICKER_MIN_TURNOVER || '1.0' }}
          WEEKLY_PICKER_MAX_TURNOVER: ${{ vars.WEEKLY_PICKER_MAX_TURNOVER || '20.0' }}
          WEEKLY_PICKER_MIN_PRICE: ${{ vars.WEEKLY_PICKER_MIN_PRICE || '3.0' }}
          WEEKLY_PICKER_MAX_PRICE: ${{ vars.WEEKLY_PICKER_MAX_PRICE || '200.0' }}
          WEEKLY_PICKER_SECTOR_COUNT: ${{ vars.WEEKLY_PICKER_SECTOR_COUNT || '8' }}
          WEEKLY_PICKER_MAX_PER_SECTOR: ${{ vars.WEEKLY_PICKER_MAX_PER_SECTOR || '1' }}
          WEEKLY_PICKER_NEWS_DAYS: ${{ vars.WEEKLY_PICKER_NEWS_DAYS || '14' }}
          WEEKLY_PICKER_NEWS_RESULTS: ${{ vars.WEEKLY_PICKER_NEWS_RESULTS || '3' }}

          # 数据和搜索
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}

          # 通知渠道：复用现有飞书/其他通知配置
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: ${{ vars.FEISHU_WEBHOOK_KEYWORD || secrets.FEISHU_WEBHOOK_KEYWORD }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ vars.PUSHPLUS_TOPIC || secrets.PUSHPLUS_TOPIC }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          GOTIFY_URL: ${{ secrets.GOTIFY_URL }}
          GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          CUSTOM_WEBHOOK_BODY_TEMPLATE: ${{ vars.CUSTOM_WEBHOOK_BODY_TEMPLATE || secrets.CUSTOM_WEBHOOK_BODY_TEMPLATE }}
          WEBHOOK_VERIFY_SSL: ${{ vars.WEBHOOK_VERIFY_SSL || secrets.WEBHOOK_VERIFY_SSL || 'true' }}
          NOTIFICATION_REPORT_CHANNELS: ${{ vars.NOTIFICATION_REPORT_CHANNELS || secrets.NOTIFICATION_REPORT_CHANNELS }}
          NOTIFICATION_DEDUP_TTL_SECONDS: ${{ vars.NOTIFICATION_DEDUP_TTL_SECONDS || secrets.NOTIFICATION_DEDUP_TTL_SECONDS || '0' }}
          NOTIFICATION_COOLDOWN_SECONDS: ${{ vars.NOTIFICATION_COOLDOWN_SECONDS || secrets.NOTIFICATION_COOLDOWN_SECONDS || '0' }}
          NOTIFICATION_QUIET_HOURS: ${{ vars.NOTIFICATION_QUIET_HOURS || secrets.NOTIFICATION_QUIET_HOURS }}
          NOTIFICATION_TIMEZONE: ${{ vars.NOTIFICATION_TIMEZONE || secrets.NOTIFICATION_TIMEZONE || 'Asia/Shanghai' }}
          NOTIFICATION_MIN_SEVERITY: ${{ vars.NOTIFICATION_MIN_SEVERITY || secrets.NOTIFICATION_MIN_SEVERITY }}
        run: |
          echo "=========================================="
          echo "AI 每周候选股票池"
          echo "北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "候选数量: $WEEKLY_PICKER_TOP_N"
          echo "新闻补充: $WEEKLY_PICKER_NEWS_ENABLED"
          echo "飞书: $([ -n "$FEISHU_WEBHOOK_URL" ] && echo '已配置' || echo '未配置')"
          echo "Tavily: $([ -n "$TAVILY_API_KEYS" ] && echo '已配置' || echo '未配置')"
          echo "=========================================="
          python scripts/weekly_stock_picker.py

      - name: 上传候选报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: weekly-stock-picker-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
